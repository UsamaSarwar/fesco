<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FESCO Bill Checker</title>
  <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
  <header>
    <h1>FESCO Bill Checker</h1>
    <p>Enter a reference number to load and explore your bill details in a modern dashboard.</p>
  </header>

  <main>
    <div class="card">
      <h2>Fetch Bill</h2>
      <div class="actions">
        <input id="refInput" class="ref-input" placeholder="14-digit reference ID" />
        <button id="fetchBtn" class="fetch-btn" disabled>Fetch</button>
      </div>
    </div>

    <div id="viewer" class="card" style="display: none;">
      <div id="dashboard"></div>

      <h2>Bill Summary</h2>
      <div id="summary"></div>

      <h2>Charges Breakdown</h2>
      <div id="charges"></div>

      <h2>Billing History</h2>
      <div id="history"></div>

      <h2>Raw JSON</h2>
      <pre id="raw"></pre>
<h2>Bill HTML</h2>
<iframe id="htmlFrame" style="width: 100%; height: 600px; border: 1px solid #ccc;"></iframe>
    </div>
  </main>

  <script src="./scripts/app.js"></script>
</body>
</html>
